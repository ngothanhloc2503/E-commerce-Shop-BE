aws:
    access_key: REDACTED_AWS_ACCESS_KEY
    region: ap-southeast-1
    s3:
        bucket:
            name: ecommerce-bucket-hcmus
    secret_key: REDACTED_AWS_SECRET_KEY
jwt:
    secretKey: REDACTED_JWT_SECRET
logging:
    level:
        com:
            shopping: debug
        root: warn
server:
    port: 8080
spring:
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3307/ecommercedb
        password: admin123
        username: root
    http:
        multipart:
            enabled: true
            max-file-size: 10MB
            max-request-size: 10MB
    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect
                format_sql: true
        show-sql: false
    main:
        banner-mode: 'off'
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: REDACTED_GOOGLE_CLIENT_ID
                        client-secret: REDACTED_GOOGLE_CLIENT_SECRET
                        scope: email, profile
                    facebook:
                        client-id: 998920801940188
                        client-secret: 4235bcdb6cd3804bffcb15eba931cdc3
                        scope: email, public-profile

    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 10MB
