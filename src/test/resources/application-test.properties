# =====================================================
# Test Profile Configuration - H2 In-Memory Database
# Place this file in: src/test/resources/
# =====================================================
#
# H2 in-memory database is used for repository tests.
# It's fast, isolated, and doesn't require a running DB.
#
# IMPORTANT: schema.sql must create PostgreSQL-compatible
# DOMAIN types (CREATE DOMAIN IF NOT EXISTS) because H2
# doesn't understand PostgreSQL's custom enum types.
# =====================================================

# --- DataSource: H2 In-Memory ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- SQL Init ---
# Runs schema.sql BEFORE Hibernate's auto-DDL to create
# PostgreSQL DOMAIN types that H2 doesn't natively understand
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
