# ==================== OVERRIDE CHO TEST ====================
# File này override application.yml khi chạy test
# Tất cả giá trị đều là dummy - không chứa key thật
app:
    redis:
        enabled: false
spring:
    datasource:
        driver-class-name: org.h2.Driver
        password: ''
        url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER,VALUE;MODE=PostgreSQL
        username: sa
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: create-drop
        open-in-view: false
        show-sql: false
    sql:
        init:
            mode: always
            schema-locations: classpath:schema.sql
    cache:
        type: simple
        cache-names: category-all, categories, category-by-name, products, home-products, product-by-alias, products-page
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: test-google-client-id
                        client-secret: test-google-client-secret
                        scope: email, profile
                    facebook:
                        client-id: test-facebook-client-id
                        client-secret: test-facebook-client-secret
                        scope: email, public-profile
    autoconfigure:
        exclude:
            - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
            - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
            - org.redisson.spring.starter.RedissonAutoConfigurationV2

server:
    port: 0
# ==================== AWS (dummy) ====================
aws:
    access_key: test-aws-access-key
    region: us-east-1
    s3:
        bucket:
            name: test-bucket-name
    secret_key: test-aws-secret-key

# ==================== JWT (dummy) ====================
jwt:
    secret: testJwtSecretKeyForBuildOnlyDoNotUseInProduction1234567890
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

# ==================== RATE LIMIT ====================
rate-limit:
    default-rule:
        max-requests: 10
        time-window: 1
        time-unit: MINUTES
    rules:
        register:
            max-requests: 3
            time-window: 1
            time-unit: MINUTES
        login:
            max-requests: 5
            time-window: 1
            time-unit: MINUTES
        refresh:
            max-requests: 5
            time-window: 1
            time-unit: MINUTES
        forgotPassword:
            max-requests: 5
            time-window: 1
            time-unit: MINUTES
        resetPassword:
            max-requests: 3
            time-window: 1
            time-unit: MINUTES
        api:
            max-requests: 50
            time-window: 1
            time-unit: MINUTES